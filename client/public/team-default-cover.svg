<svg width="1600" height="480" viewBox="0 0 1600 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09090B"/>
      <stop offset="0.5" stop-color="#18181B"/>
      <stop offset="1" stop-color="#0F0F13"/>
    </linearGradient>
    <radialGradient id="worldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 140) rotate(25) scale(500 220)">
      <stop stop-color="#EF4444" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="libGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 120) rotate(165) scale(420 190)">
      <stop stop-color="#F87171" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#F87171" stop-opacity="0"/>
    </radialGradient>
    <pattern id="noise" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#27272A" fill-opacity="0.5"/>
      <circle cx="12" cy="8" r="0.8" fill="#3F3F46" fill-opacity="0.45"/>
      <circle cx="20" cy="16" r="0.9" fill="#27272A" fill-opacity="0.5"/>
    </pattern>
    <linearGradient id="brandLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#EF4444" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#EF4444" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#EF4444" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="480" fill="url(#bg)"/>
  <rect width="1600" height="480" fill="url(#worldGlow)"/>
  <rect width="1600" height="480" fill="url(#libGlow)"/>

  <!-- Stylized world rings (Sekai) -->
  <g opacity="0.5" stroke="#52525B" stroke-width="2">
    <ellipse cx="250" cy="160" rx="120" ry="68"/>
    <ellipse cx="250" cy="160" rx="92" ry="52"/>
    <path d="M130 160H370"/>
    <path d="M250 92V228"/>
  </g>

  <!-- Stylized book pages (Lib) -->
  <g opacity="0.75" stroke="#71717A" stroke-width="3" stroke-linecap="round">
    <path d="M1210 250C1260 218 1318 218 1370 250"/>
    <path d="M1210 250C1260 282 1318 282 1370 250"/>
    <path d="M1180 252C1238 210 1312 210 1388 252" stroke="#3F3F46"/>
  </g>

  <!-- Brand watermark -->
  <g opacity="0.18">
    <text x="800" y="262" text-anchor="middle" fill="#F4F4F5" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="6">SEKAI</text>
    <text x="800" y="336" text-anchor="middle" fill="#EF4444" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="8">LIB</text>
  </g>

  <path d="M-120 358C190 188 452 452 770 312C1070 180 1320 290 1730 104" stroke="#3F3F46" stroke-opacity="0.7" stroke-width="2"/>
  <path d="M-160 296C150 102 450 382 780 242C1092 108 1360 220 1780 34" stroke="#27272A" stroke-opacity="0.95" stroke-width="2"/>

  <rect width="1600" height="480" fill="url(#noise)" opacity="0.45"/>
  <rect x="0" y="346" width="1600" height="4" fill="url(#brandLine)"/>
</svg>
