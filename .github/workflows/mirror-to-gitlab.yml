name: Mirror to GitLab

on:
  push:
    branches: ['**']
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@git.ztu.edu.ua/ipz/2022-2026/ipz-22-4/petrov-denys/sekailib.git
          git push --mirror gitlab